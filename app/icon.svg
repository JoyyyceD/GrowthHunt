<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!--
    GrowthHunt favicon. Direct fill/stroke attributes (no <style> block) —
    Chrome's favicon renderer and many SERP/social previewers strip inline
    CSS, which is why the ring went missing in browser tabs before.
  -->
  <rect width="192" height="192" rx="32" fill="#fafaf7"/>
  <circle cx="96" cy="96" r="74" fill="none" stroke="#14110d" stroke-width="14"/>
  <circle cx="96" cy="96" r="36" fill="#e84e1b"/>
</svg>
