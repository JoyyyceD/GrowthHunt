<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80">
  <!--
    GrowthHunt.ai — full horizontal lockup (mark + wordmark).
    The wordmark uses Instrument Serif (loaded by the site via Google Fonts).
    In environments without Instrument Serif, falls back to Georgia / generic serif.
    For print or design-tool use, consider exporting text as paths from this file.
    Colors: ink #14110d · accent #e84e1b.
  -->
  <circle cx="40" cy="40" r="28" fill="none" stroke="#14110d" stroke-width="3"/>
  <circle cx="40" cy="40" r="13" fill="#e84e1b"/>
  <text
    x="88"
    y="52"
    font-family="'Instrument Serif', Georgia, 'Times New Roman', serif"
    font-size="40"
    fill="#14110d"
    letter-spacing="-1"
  >GrowthHunt.ai</text>
</svg>
